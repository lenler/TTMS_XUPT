server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: ttms-backend
  datasource:
    url: jdbc:mysql://localhost:3306/ttms?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ttms
    password: ttms
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

ttms:
  cors:
    allowed-origins:
      - http://localhost:5173
  ticket:
    lock-timeout-minutes: 10
